name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build workspace
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Stage binaries (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/simaris simaris-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/simaris-server simaris-server-${{ matrix.suffix }}

      - name: Stage binaries (windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/simaris.exe simaris-${{ matrix.suffix }}.exe
          cp target/${{ matrix.target }}/release/simaris-server.exe simaris-server-${{ matrix.suffix }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            simaris-${{ matrix.suffix }}*
            simaris-server-${{ matrix.suffix }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/simonspoon/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tool]=simaris" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[repo]=simonspoon/simaris"
