name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: darwin-amd64
            zigbuild: true
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      # zig's linker resolves the AVX-512 symbol that Apple ld rejects when
      # cross-compiling x86_64 from the arm64 macos-latest runner (lance-index v0.39).
      - name: Install zig + cargo-zigbuild
        if: matrix.zigbuild
        run: |
          brew install zig
          cargo install --locked cargo-zigbuild

      - name: Build workspace
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release --workspace --target ${{ matrix.target }}
          else
            cargo build --release --workspace --target ${{ matrix.target }}
          fi

      - name: Stage binaries
        run: |
          cp target/${{ matrix.target }}/release/simaris simaris-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/simaris-server simaris-server-${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            simaris-${{ matrix.suffix }}*
            simaris-server-${{ matrix.suffix }}*

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-tap:
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/simonspoon/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tool]=simaris" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[repo]=simonspoon/simaris"
