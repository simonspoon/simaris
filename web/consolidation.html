<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simaris admin — consolidation</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      /* Consolidation page — two-pane: cluster list (left), member detail (right). */

      body.consolidation-page {
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }
      body.consolidation-page .main {
        padding: 0;
        overflow: hidden;
        min-height: 0;
        display: flex;
        flex: 1;
      }

      .cons {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* ── Toolbar across the top ── */
      .cons__toolbar {
        position: absolute;
        right: 16px;
        top: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        z-index: 10;
      }
      .cons__btn {
        padding: 6px 12px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        color: var(--fg);
        font: 12px system-ui, -apple-system, sans-serif;
        cursor: pointer;
        border-radius: 4px;
      }
      .cons__btn:hover { border-color: var(--accent); }
      .cons__btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .cons__summary {
        font: 11px var(--mono);
        color: var(--fg-muted);
      }

      /* ── Left: cluster list ── */
      .cons__left {
        width: 360px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--bg-elev);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .cons__filter-bar {
        padding: 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .cons__filter-row {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .cons__pat-chip {
        padding: 3px 8px;
        border-radius: 99px;
        font: 11px system-ui, sans-serif;
        cursor: pointer;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg-muted);
        white-space: nowrap;
      }
      .cons__pat-chip.active {
        background: var(--accent-bg);
        color: var(--fg);
        border-color: var(--accent);
      }
      .cons__cluster-card {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cons__cluster-card:hover { background: rgba(255,255,255,0.03); }
      .cons__cluster-card.active { background: var(--accent-bg); }
      .cons__cluster-line1 {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cons__cluster-id {
        font: 600 12px var(--mono);
        color: var(--fg);
      }
      .cons__cluster-size {
        font: 11px var(--mono);
        color: var(--fg-muted);
      }
      .cons__pat-tags { display: flex; gap: 3px; flex-wrap: wrap; }
      .cons__pat-tag {
        font: 9px var(--mono);
        padding: 1px 5px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .cons__pat-tag--near-dup     { background: rgba(248,113,113,0.18); color: #f87171; }
      .cons__pat-tag--temporal-log { background: rgba(251,146,60,0.18);  color: #fb923c; }
      .cons__pat-tag--type-confused{ background: rgba(234,179,8,0.18);   color: #eab308; }
      .cons__pat-tag--low-signal   { background: rgba(148,163,184,0.18); color: #94a3b8; }
      .cons__pat-tag--orphan       { background: rgba(99,102,241,0.18);  color: #a5b4fc; }
      .cons__cluster-suggested {
        font: 10px var(--mono);
        color: var(--fg-muted);
      }

      /* ── Right: detail pane ── */
      .cons__right {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        min-width: 0;
      }
      .cons__right-empty {
        color: var(--fg-muted);
        font: 13px system-ui, sans-serif;
        padding-top: 40px;
        text-align: center;
      }
      .cons__detail-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
        margin-bottom: 12px;
      }
      .cons__detail-title {
        font: 600 14px var(--mono);
        color: var(--fg);
      }
      .cons__detail-meta { font: 11px var(--mono); color: var(--fg-muted); }
      .cons__action-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .cons__action-bar select,
      .cons__action-bar input[type=text] {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--fg);
        padding: 4px 8px;
        font: 12px var(--mono);
        border-radius: 4px;
      }
      .cons__action-submit {
        padding: 6px 14px;
        background: var(--accent);
        color: #111;
        border: none;
        border-radius: 4px;
        font: 600 12px system-ui, sans-serif;
        cursor: pointer;
      }
      .cons__action-submit:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Member cards: side-by-side flex grid */
      .cons__members {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        gap: 12px;
      }
      .cons__member {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: var(--bg-elev);
      }
      .cons__member-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 6px;
      }
      .cons__member-id {
        font: 600 11px var(--mono);
        color: var(--fg);
      }
      .cons__member-meta {
        font: 10px var(--mono);
        color: var(--fg-muted);
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .cons__member-meta span { white-space: nowrap; }
      .cons__member-content {
        font: 12px/1.4 var(--mono);
        color: var(--fg);
        max-height: 240px;
        overflow-y: auto;
        white-space: pre-wrap;
        background: var(--bg);
        padding: 8px;
        border-radius: 4px;
        word-break: break-word;
      }
      .cons__member-controls {
        display: flex;
        gap: 8px;
        font: 11px system-ui, sans-serif;
        color: var(--fg-muted);
      }
      .cons__member-controls label { display: flex; align-items: center; gap: 3px; }

      .cons__result-box {
        margin-top: 12px;
        padding: 10px;
        border-radius: 4px;
        font: 11px var(--mono);
        white-space: pre-wrap;
        max-height: 200px;
        overflow-y: auto;
      }
      .cons__result-box.ok    { background: rgba(34,197,94,0.10); color: #4ade80; }
      .cons__result-box.error { background: rgba(248,113,113,0.10); color: #f87171; }
    </style>
  </head>
  <body class="consolidation-page">
    <nav class="nav">
      <span class="nav__brand">simaris</span>
      <div class="nav__tabs">
        <a class="nav__tab" href="/triage">Triage</a>
        <a class="nav__tab" href="/dashboard">Dashboard</a>
        <a class="nav__tab" href="/browse">Browse</a>
        <a class="nav__tab nav__tab--active" href="/consolidation">Consolidation</a>
      </div>
    </nav>

    <main class="main">
      <div class="cons__toolbar">
        <span class="cons__summary" id="cons-summary">loading…</span>
        <button type="button" id="cons-refresh" class="cons__btn">Refresh clusters</button>
      </div>

      <div class="cons">
        <aside class="cons__left">
          <div class="cons__filter-bar">
            <div class="cons__filter-row" id="cons-pattern-filters">
              <button type="button" class="cons__pat-chip active" data-pattern="all">all</button>
            </div>
          </div>
          <div id="cons-cluster-list"></div>
        </aside>
        <section class="cons__right" id="cons-detail">
          <div class="cons__right-empty">Select a cluster on the left to review its members.</div>
        </section>
      </div>
    </main>

    <div id="status" class="status">ready.</div>
    <script type="module" src="/consolidation.js"></script>
  </body>
</html>
