<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simaris admin — browse</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@13.0.0/marked.min.js"></script>
    <style>
      /* Browse page layout — extends base styles.css Signal variables */

      /* LEFT PANEL */
      .browse__left {
        width: 300px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: var(--bg-elev);
        overflow: hidden;
      }
      .browse__toolbar {
        padding: 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .browse__search {
        width: 100%;
        padding: 7px 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        font: 13px system-ui, -apple-system, sans-serif;
        color: var(--fg);
        outline: none;
        margin-bottom: 8px;
      }
      .browse__search::placeholder { color: var(--fg-muted); }
      .browse__search:focus { border-color: var(--accent); }
      .browse__chips { display: flex; flex-wrap: wrap; gap: 4px; }

      /* Filter chips */
      .br-chip {
        padding: 3px 8px;
        border-radius: 99px;
        font: 11px system-ui, sans-serif;
        cursor: pointer;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg-muted);
        white-space: nowrap;
        transition: background .1s, color .1s, border-color .1s;
      }
      .br-chip--on { font-weight: 600; }
      .br-chip--on.br-chip--principle { background: var(--c-principle); border-color: var(--c-principle); color: #111; }
      .br-chip--on.br-chip--fact      { background: var(--c-fact);      border-color: var(--c-fact);      color: #111; }
      .br-chip--on.br-chip--lesson    { background: var(--c-lesson);    border-color: var(--c-lesson);    color: #111; }
      .br-chip--on.br-chip--procedure { background: var(--c-procedure); border-color: var(--c-procedure); color: #111; }
      .br-chip--on.br-chip--aspect    { background: var(--c-aspect);    border-color: var(--c-aspect);    color: #111; }
      .br-chip--on.br-chip--idea      { background: var(--c-idea);      border-color: var(--c-idea);      color: #111; }
      .br-chip--on.br-chip--preference { background: var(--c-preference); border-color: var(--c-preference); color: #111; }
      .br-chip-count { font-size: 10px; opacity: .75; }

      /* Card list */
      .browse__card-list { flex: 1; overflow-y: auto; padding: 6px; }
      .browse__list-footer {
        padding: 8px;
        border-top: 1px solid var(--border);
        text-align: center;
        flex-shrink: 0;
      }
      .browse__load-more {
        background: none;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--fg-muted);
        font: 12px system-ui, sans-serif;
        cursor: pointer;
        padding: 5px 12px;
      }
      .browse__load-more:hover { color: var(--accent); border-color: var(--accent); }

      /* Cards */
      .br-card {
        padding: 9px 11px;
        border-radius: 5px;
        cursor: pointer;
        margin-bottom: 3px;
        border: 1px solid transparent;
        border-left-width: 3px;
        background: var(--bg);
        transition: border-color .1s, background .1s;
      }
      .br-card:hover { background: var(--accent-bg); border-color: var(--border); }
      .br-card--sel { background: var(--accent-bg) !important; border-color: var(--accent) !important; }

      .br-card--principle { border-left-color: var(--c-principle); }
      .br-card--fact      { border-left-color: var(--c-fact); }
      .br-card--lesson    { border-left-color: var(--c-lesson); }
      .br-card--procedure { border-left-color: var(--c-procedure); }
      .br-card--aspect    { border-left-color: var(--c-aspect); }
      .br-card--idea      { border-left-color: var(--c-idea); }
      .br-card--preference { border-left-color: var(--c-preference); }

      .br-card--sel.br-card--principle { border-color: var(--c-principle); }
      .br-card--sel.br-card--fact      { border-color: var(--c-fact); }
      .br-card--sel.br-card--lesson    { border-color: var(--c-lesson); }
      .br-card--sel.br-card--procedure { border-color: var(--c-procedure); }
      .br-card--sel.br-card--aspect    { border-color: var(--c-aspect); }
      .br-card--sel.br-card--idea      { border-color: var(--c-idea); }
      .br-card--sel.br-card--preference { border-color: var(--c-preference); }

      .br-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
      .br-card-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
      .br-card-type { font: 10px var(--mono); text-transform: uppercase; letter-spacing: .04em; flex: 1; }
      .br-card-conf { font: 10px var(--mono); color: var(--fg-muted); }
      .br-card-title {
        font-size: 12px; color: var(--fg); line-height: 1.35; margin-bottom: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .br-card-snippet {
        font-size: 11px; color: var(--fg-muted); line-height: 1.35;
        overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
      }
      .br-card-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
      .br-card-tag { font: 9px var(--mono); color: var(--fg-muted); background: var(--border); border-radius: 2px; padding: 1px 4px; }
      .br-card-slug { font: 9px var(--mono); color: var(--fg-muted); margin-top: 3px; }
      .br-empty { padding: 1rem; color: var(--fg-muted); font-size: 13px; text-align: center; }

      /* RIGHT PANEL */
      .browse__right { flex: 1; overflow-y: auto; padding: 1.25rem; min-width: 0; }
      .br-empty-state {
        display: flex; align-items: center; justify-content: center;
        height: 200px; color: var(--fg-muted); font-size: 13px;
      }

      /* Detail pane */
      .br-detail-header {
        margin-bottom: 1.25rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
      }
      .br-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
      .br-type-badge {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 3px 10px; border-radius: 99px;
        font: 600 11px var(--mono); text-transform: uppercase; letter-spacing: .04em;
      }
      .br-type-badge .br-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
      .br-type-badge--principle { background: color-mix(in srgb, var(--c-principle) 12%, transparent); color: var(--c-principle); border: 1px solid color-mix(in srgb, var(--c-principle) 30%, transparent); }
      .br-type-badge--fact      { background: color-mix(in srgb, var(--c-fact)      12%, transparent); color: var(--c-fact);      border: 1px solid color-mix(in srgb, var(--c-fact)      30%, transparent); }
      .br-type-badge--lesson    { background: color-mix(in srgb, var(--c-lesson)    12%, transparent); color: var(--c-lesson);    border: 1px solid color-mix(in srgb, var(--c-lesson)    30%, transparent); }
      .br-type-badge--procedure { background: color-mix(in srgb, var(--c-procedure) 12%, transparent); color: var(--c-procedure); border: 1px solid color-mix(in srgb, var(--c-procedure) 30%, transparent); }
      .br-type-badge--aspect    { background: color-mix(in srgb, var(--c-aspect)    12%, transparent); color: var(--c-aspect);    border: 1px solid color-mix(in srgb, var(--c-aspect)    30%, transparent); }
      .br-type-badge--idea      { background: color-mix(in srgb, var(--c-idea)      12%, transparent); color: var(--c-idea);      border: 1px solid color-mix(in srgb, var(--c-idea)      30%, transparent); }
      .br-type-badge--preference { background: color-mix(in srgb, var(--c-preference) 12%, transparent); color: var(--c-preference); border: 1px solid color-mix(in srgb, var(--c-preference) 30%, transparent); }

      .br-detail-slug { font: 11px var(--mono); color: var(--fg-muted); }
      .br-detail-id   { font: 10px var(--mono); color: var(--fg-muted); }
      .br-detail-conf { font: 11px var(--mono); color: var(--fg-muted); }
      .br-detail-title { font: 600 18px/1.3 system-ui, sans-serif; color: var(--fg); margin-bottom: 6px; word-break: break-word; }
      .br-detail-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--fg-muted); margin-bottom: 8px; }
      .br-detail-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
      .br-detail-tag {
        padding: 2px 8px; font: 11px var(--mono);
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 99px; color: var(--fg-muted);
      }

      .br-section-title {
        font: 600 10px var(--mono); text-transform: uppercase; letter-spacing: .08em;
        color: var(--fg-muted); margin: 1.25rem 0 0.5rem;
      }

      /* Markdown content */
      .br-content {
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px;
        padding: 1rem; font-size: 13px; line-height: 1.6; word-break: break-word;
        color: var(--fg);
      }
      .br-content h1, .br-content h2, .br-content h3, .br-content h4 { margin: 1em 0 .4em; font-weight: 600; line-height: 1.3; }
      .br-content h1 { font-size: 1.2rem; }
      .br-content h2 { font-size: 1.05rem; }
      .br-content h3 { font-size: 1rem; color: var(--fg-muted); }
      .br-content h4 { font-size: .95rem; color: var(--fg-muted); }
      .br-content p { margin: .4em 0; }
      .br-content ul, .br-content ol { margin: .4em 0; padding-left: 1.5em; }
      .br-content li { margin: .15em 0; }
      .br-content code { font: 12px var(--mono); background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: .05em .3em; }
      .br-content pre { margin: .6em 0; padding: .75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow-x: auto; font-size: 12px; line-height: 1.45; }
      .br-content pre code { background: transparent; border: none; padding: 0; display: block; }
      .br-content table { border-collapse: collapse; margin: .6em 0; font-size: 12px; }
      .br-content th, .br-content td { border: 1px solid var(--border); padding: .25rem .5rem; text-align: left; }
      .br-content th { background: var(--bg); font-weight: 600; }
      .br-content blockquote { margin: .5em 0; padding: .2em .75em; border-left: 3px solid var(--border); color: var(--fg-muted); }
      .br-content hr { border: none; border-top: 1px solid var(--border); margin: .75em 0; }
      .br-content a { color: var(--accent); text-decoration: underline; }
      .br-content strong { font-weight: 600; }
      .br-content em { font-style: italic; }

      /* Links panel */
      .br-link-list { display: flex; flex-direction: column; gap: 5px; }
      .br-link-item {
        display: flex; align-items: center; gap: 7px; padding: 7px 9px;
        background: var(--bg-elev); border: 1px solid var(--border); border-radius: 4px;
        font-size: 12px; cursor: pointer;
      }
      .br-link-item:hover { border-color: var(--accent); }
      .br-link-rel {
        font: 10px var(--mono); padding: 1px 6px;
        background: var(--accent-bg); color: var(--accent); border-radius: 3px; flex-shrink: 0;
      }
      .br-link-text { flex: 1; color: var(--fg-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .br-link-type { font: 9px var(--mono); color: var(--fg-muted); flex-shrink: 0; }
      .br-links-empty { font-size: 12px; color: var(--fg-muted); font-style: italic; margin: 0; }

      /* Action row */
      .br-actions {
        display: flex; gap: 8px; margin-top: 1rem;
        padding-top: .75rem; border-top: 1px solid var(--border);
      }
      .br-btn {
        padding: 6px 14px; background: var(--bg-elev);
        border: 1px solid var(--border); border-radius: 4px;
        font: 13px system-ui, sans-serif; color: var(--fg-muted); cursor: pointer;
      }
      .br-btn:hover { color: var(--fg); border-color: var(--fg-muted); }
      .br-btn--primary { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
      .br-btn--danger  { color: var(--error, #ef5350); }
      .br-btn--danger:hover { border-color: var(--error, #ef5350); }

      /* Edit form */
      .br-edit-form { display: flex; flex-direction: column; gap: .75rem; margin-top: 1rem; }
      .br-field { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
      .br-field label { font: 11px var(--mono); text-transform: uppercase; letter-spacing: .04em; color: var(--fg-muted); }
      .br-field textarea, .br-field input, .br-field select {
        padding: 7px 9px; border: 1px solid var(--border); border-radius: 4px;
        background: var(--bg-elev); font: inherit; color: var(--fg);
      }
      .br-field textarea { font: 12px var(--mono); resize: vertical; min-height: 200px; }
      .br-field textarea:focus, .br-field input:focus, .br-field select:focus { border-color: var(--accent); outline: none; }
      .br-form-row { display: flex; gap: 12px; }
      .br-form-row .br-field { flex: 1; min-width: 0; }
    </style>
  </head>
  <body class="browse-page">
    <nav class="nav">
      <span class="nav__brand">simaris</span>
      <div class="nav__tabs">
        <a class="nav__tab" href="/">Dashboard</a>
        <a class="nav__tab nav__tab--active" href="/browse">Browse</a>
        <a class="nav__tab" href="/units.html">Units</a>
        <a class="nav__tab" href="/wiki">Wiki</a>
      </div>
      <span id="br-count" style="margin-left:auto;font:12px var(--mono);color:var(--fg-muted)"></span>
    </nav>

    <main class="main">
      <div class="browse">
        <!-- LEFT: filter + card list -->
        <div class="browse__left">
          <div class="browse__toolbar">
            <input
              class="browse__search"
              id="br-search"
              type="text"
              placeholder="search units…"
              autocomplete="off"
              spellcheck="false"
            />
            <div class="browse__chips" id="br-chips"></div>
          </div>
          <div class="browse__card-list" id="br-card-list">
            <div class="br-empty">loading…</div>
          </div>
          <div class="browse__list-footer" id="br-list-footer" hidden>
            <button class="browse__load-more" id="br-load-more">load more</button>
          </div>
        </div>

        <!-- RIGHT: detail pane -->
        <div class="browse__right" id="br-detail">
          <div class="br-empty-state">← select a unit</div>
        </div>
      </div>
    </main>

    <div id="status" class="status">ready.</div>

    <script type="module" src="/browse.js"></script>
  </body>
</html>
