<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simaris admin — triage</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      /* ── Triage page layout (Layer 4) ── */

      body.triage-page {
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }
      body.triage-page .main {
        padding: 0;
        overflow: hidden;
        min-height: 0;
        display: flex;
        flex: 1;
      }

      /* Three-pane shell */
      .triage {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* ── Category sidebar ── */
      .triage__sidebar {
        width: 200px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--bg-elev);
        overflow-y: auto;
        padding: 12px 0;
        display: flex;
        flex-direction: column;
      }
      .triage__group-label {
        padding: 8px 14px 4px;
        font: 600 10px var(--mono);
        color: var(--fg-dim);
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      .triage__cat-btn {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 6px 14px;
        background: none;
        border: none;
        color: var(--fg-muted);
        font: 13px system-ui, -apple-system, sans-serif;
        cursor: pointer;
        gap: 8px;
        text-align: left;
      }
      .triage__cat-btn:hover { background: var(--accent-bg); color: var(--fg); }
      .triage__cat-btn.active { background: var(--accent-bg); color: var(--fg); }
      .triage__cat-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .triage__cat-name { flex: 1; }
      .triage__cat-count {
        font: 600 11px var(--mono);
        border-radius: 10px;
        min-width: 20px;
        height: 16px;
        padding: 0 5px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .triage__cat-count.none { color: var(--fg-dim); background: none; }
      .triage__cnt-crit    { background: rgba(248,113,113,0.18); color: #f87171; }
      .triage__cnt-warn    { background: rgba(251,146,60,0.18);  color: #fb923c; }
      .triage__cnt-caution { background: rgba(234,179,8,0.18);   color: #eab308; }
      .triage__cnt-muted   { color: var(--fg-muted); background: none; }

      /* Nav badge */
      .nav__tab-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 16px;
        padding: 0 5px;
        font: 600 10px var(--mono);
        background: rgba(248,113,113,0.22);
        color: #f87171;
        border-radius: 10px;
        margin-left: 5px;
        vertical-align: middle;
      }

      /* Health block at bottom of sidebar */
      .triage__health {
        margin: auto 10px 0;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        margin-top: 14px;
        margin-left: 10px;
        margin-right: 10px;
        margin-bottom: 10px;
      }
      .triage__health.dirty { border-color: rgba(248,113,113,0.4); }
      .triage__health.clean { border-color: rgba(74,222,128,0.3); }
      .triage__health-label {
        font: 600 10px var(--mono);
        letter-spacing: .05em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .triage__health.dirty .triage__health-label { color: #f87171; }
      .triage__health.clean .triage__health-label { color: var(--ok); }
      .triage__health-detail { font-size: 11px; color: var(--fg-muted); line-height: 1.6; }

      /* ── Item list pane ── */
      .triage__list-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }
      .triage__list-header {
        padding: 12px 16px 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .triage__list-title {
        font: 600 14px system-ui, sans-serif;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .triage__list-desc {
        font-size: 12px;
        color: var(--fg-muted);
        flex: 1;
      }
      .triage__toolbar {
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        background: var(--bg-elev);
      }
      .triage__toolbar-count {
        font: 12px var(--mono);
        color: var(--fg-muted);
        margin-right: 4px;
      }
      .triage__btn-sm {
        padding: 3px 9px;
        font: 12px system-ui, sans-serif;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: transparent;
        color: var(--fg-muted);
        cursor: pointer;
      }
      .triage__btn-sm:hover { color: var(--fg); border-color: var(--fg-muted); }
      .triage__btn-sm.danger:hover { color: #f87171; border-color: #f87171; }
      .triage__spacer { flex: 1; }
      .triage__scroll {
        flex: 1;
        overflow-y: auto;
      }

      /* Item rows */
      .triage__row {
        display: flex;
        align-items: flex-start;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        gap: 10px;
        cursor: pointer;
        transition: background .1s;
      }
      .triage__row:hover { background: var(--accent-bg); }
      .triage__row.selected { background: var(--accent-bg); }
      .triage__row-cb {
        padding-top: 2px;
        flex-shrink: 0;
      }
      .triage__row-cb input[type=checkbox] {
        accent-color: var(--accent);
        cursor: pointer;
      }
      .triage__type-pip {
        width: 3px;
        height: 36px;
        border-radius: 2px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .triage__row-body { flex: 1; min-width: 0; }
      .triage__row-headline {
        font-size: 13px;
        color: var(--fg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
      }
      .triage__row-meta {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
      }
      .triage__type-chip {
        font: 600 10px var(--mono);
        padding: 1px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: .03em;
      }
      .triage__tag-chip {
        font: 11px var(--mono);
        color: var(--fg-muted);
        padding: 1px 5px;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      .triage__mark-chip {
        font: 600 10px var(--mono);
        padding: 1px 6px;
        border-radius: 4px;
        letter-spacing: .02em;
      }
      .mark-wrong    { background: rgba(248,113,113,0.18); color: #f87171; }
      .mark-outdated { background: rgba(251,146,60,0.18);  color: #fb923c; }
      .triage__meta-age   { font: 11px var(--mono); color: var(--fg-dim); margin-left: 2px; }
      .triage__meta-bytes { font: 11px var(--mono); color: #eab308; }

      .triage__row-actions {
        flex-shrink: 0;
        display: flex;
        gap: 4px;
        align-items: center;
        opacity: 0;
        transition: opacity .15s;
      }
      .triage__row:hover .triage__row-actions,
      .triage__row.selected .triage__row-actions { opacity: 1; }
      .triage__act-btn {
        padding: 3px 8px;
        font: 11px system-ui, sans-serif;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg-elev);
        color: var(--fg-muted);
        cursor: pointer;
        white-space: nowrap;
      }
      .triage__act-btn:hover { color: var(--fg); border-color: var(--fg-muted); }
      .triage__act-btn.archive:hover { color: #f87171; border-color: #f87171; }
      .triage__act-btn.verify {
        background: rgba(74,222,128,0.10);
        color: var(--ok);
        border-color: rgba(74,222,128,0.35);
      }
      .triage__act-btn.verify:hover { background: rgba(74,222,128,0.18); }
      .triage__act-btn.open {
        color: var(--accent);
        border-color: rgba(91,155,213,0.4);
      }
      .triage__act-btn.open:hover { background: var(--accent-bg); }

      /* Contradiction rows */
      .triage__contra-row {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        gap: 6px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
      }
      .triage__contra-row:hover { background: var(--accent-bg); }
      .triage__contra-pair {
        display: flex;
        align-items: stretch;
        gap: 10px;
      }
      .triage__contra-side {
        flex: 1;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 7px 10px;
        font-size: 12px;
        color: var(--fg);
        min-width: 0;
      }
      .triage__contra-vs {
        display: flex;
        align-items: center;
        font: 600 11px var(--mono);
        color: #fb923c;
        flex-shrink: 0;
        padding: 0 4px;
      }
      .triage__contra-id {
        font: 10px var(--mono);
        color: var(--fg-dim);
        margin-bottom: 3px;
      }
      .triage__contra-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .triage__contra-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
      }

      /* ── Detail pane ── */
      .triage__detail {
        width: 320px;
        flex-shrink: 0;
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg-elev);
      }
      .triage__detail.hidden {
        display: none;
      }
      .triage__detail-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        background: var(--bg);
      }
      .triage__detail-title {
        font: 600 13px system-ui, sans-serif;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .triage__detail-close {
        color: var(--fg-muted);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        padding: 0 4px;
      }
      .triage__detail-close:hover { color: var(--fg); }
      .triage__detail-body {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
      }
      .triage__detail-field { margin-bottom: 14px; }
      .triage__detail-label {
        font: 600 10px var(--mono);
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--fg-muted);
        margin-bottom: 4px;
      }
      .triage__detail-value { font-size: 12px; color: var(--fg); line-height: 1.6; }
      .triage__detail-value.mono { font-family: var(--mono); font-size: 11px; }
      .triage__detail-tags { display: flex; flex-wrap: wrap; gap: 4px; }
      .triage__detail-content {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px 12px;
        font: 12px/1.6 var(--mono);
        color: var(--fg-muted);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 200px;
        overflow-y: auto;
      }
      .triage__detail-actions {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .triage__detail-act {
        flex: 1;
        padding: 6px 0;
        font: 12px system-ui, sans-serif;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg-muted);
        cursor: pointer;
        text-align: center;
      }
      .triage__detail-act:hover { color: var(--fg); border-color: var(--fg-muted); }
      .triage__detail-act.verify {
        background: rgba(74,222,128,0.10);
        color: var(--ok);
        border-color: rgba(74,222,128,0.35);
      }
      .triage__detail-act.verify:hover { background: rgba(74,222,128,0.18); }
      .triage__detail-act.archive:hover { color: #f87171; border-color: #f87171; }

      /* Empty / clean state */
      .triage__empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 2rem;
        text-align: center;
        color: var(--fg-muted);
      }
      .triage__empty-icon { font-size: 32px; opacity: .6; }
      .triage__empty-title { font: 600 15px system-ui; color: var(--fg); }
      .triage__empty-sub { font-size: 12px; color: var(--fg-muted); max-width: 280px; line-height: 1.5; }

      /* Confirm dialog */
      .triage__confirm {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0;
        min-width: 320px;
        background: var(--bg-elev);
        color: var(--fg);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .triage__confirm::backdrop { background: rgba(0,0,0,0.6); }
      .triage__confirm-body {
        padding: 1.25rem 1.25rem 0.75rem;
      }
      .triage__confirm-title { font: 600 14px system-ui; margin: 0 0 0.4rem; }
      .triage__confirm-desc { font-size: 13px; color: var(--fg-muted); margin: 0; }
      .triage__confirm-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 0.75rem 1.25rem;
        border-top: 1px solid var(--border);
      }

      /* Fade-out animation for archived rows */
      .triage__row.fading {
        opacity: 0.3;
        pointer-events: none;
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body class="triage-page">
    <nav class="nav">
      <span class="nav__brand">simaris</span>
      <div class="nav__tabs">
        <a class="nav__tab nav__tab--active" href="/triage">
          Triage
          <span class="nav__tab-badge" id="nav-badge" style="display:none"></span>
        </a>
        <a class="nav__tab" href="/dashboard">Dashboard</a>
        <a class="nav__tab" href="/browse">Browse</a>
        <a class="nav__tab" href="/units.html">Units</a>
        <a class="nav__tab" href="/wiki">Wiki</a>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
        <span style="font-size:11px;color:var(--fg-muted)">Stale cutoff:</span>
        <div style="display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;" id="stale-seg">
          <button class="triage__btn-sm" data-days="30" style="border:none;border-right:1px solid var(--border);border-radius:0;">30d</button>
          <button class="triage__btn-sm" data-days="60" style="border:none;border-right:1px solid var(--border);border-radius:0;">60d</button>
          <button class="triage__btn-sm" data-days="90" style="border:none;border-radius:0;">90d</button>
        </div>
        <button class="btn btn--small" id="rescan-btn">↻ Rescan</button>
        <span id="scan-ts" style="font:11px var(--mono);color:var(--fg-dim)"></span>
      </div>
    </nav>

    <main class="main">
      <div class="triage">
        <!-- LEFT: category sidebar -->
        <aside class="triage__sidebar">
          <div class="triage__group-label">Critical</div>
          <button class="triage__cat-btn" data-cat="degraded">
            <span class="triage__cat-dot" style="background:#f87171"></span>
            <span class="triage__cat-name">Degraded</span>
            <span class="triage__cat-count none" id="cnt-degraded">—</span>
          </button>
          <button class="triage__cat-btn" data-cat="contradictions">
            <span class="triage__cat-dot" style="background:#fb923c"></span>
            <span class="triage__cat-name">Contradictions</span>
            <span class="triage__cat-count none" id="cnt-contradictions">—</span>
          </button>

          <div class="triage__group-label" style="margin-top:6px">Hygiene</div>
          <button class="triage__cat-btn" data-cat="oversized">
            <span class="triage__cat-dot" style="background:#eab308"></span>
            <span class="triage__cat-name">Oversized</span>
            <span class="triage__cat-count none" id="cnt-oversized">—</span>
          </button>
          <button class="triage__cat-btn" data-cat="orphaned">
            <span class="triage__cat-dot" style="background:var(--fg-dim)"></span>
            <span class="triage__cat-name">Orphaned</span>
            <span class="triage__cat-count none" id="cnt-orphaned">—</span>
          </button>
          <button class="triage__cat-btn" data-cat="stale">
            <span class="triage__cat-dot" style="background:var(--fg-muted)"></span>
            <span class="triage__cat-name">Stale</span>
            <span class="triage__cat-count none" id="cnt-stale">—</span>
          </button>

          <div style="height:1px;background:var(--border);margin:10px 14px;"></div>
          <div class="triage__health" id="health-block">
            <div class="triage__health-label" id="health-label">loading…</div>
            <div class="triage__health-detail" id="health-detail"></div>
          </div>
        </aside>

        <!-- MIDDLE: item list -->
        <div class="triage__list-pane">
          <div class="triage__list-header">
            <div class="triage__list-title" id="list-title">—</div>
            <div class="triage__list-desc" id="list-desc"></div>
          </div>
          <div class="triage__toolbar" id="list-toolbar">
            <span class="triage__toolbar-count" id="toolbar-count"></span>
            <input type="checkbox" id="select-all-cb" title="Select all" style="accent-color:var(--accent);cursor:pointer;">
            <button class="triage__btn-sm" id="btn-verify-all" disabled>✓ Verify all</button>
            <button class="triage__btn-sm danger" id="btn-archive-all" disabled>Archive all</button>
          </div>
          <div class="triage__scroll" id="item-list">
            <div class="triage__empty">
              <div class="triage__empty-icon">←</div>
              <div class="triage__empty-sub">select a category</div>
            </div>
          </div>
        </div>

        <!-- RIGHT: detail pane (hidden until item selected) -->
        <div class="triage__detail hidden" id="detail-pane">
          <div class="triage__detail-header">
            <div class="triage__detail-title" id="detail-title">—</div>
            <button class="triage__detail-close" id="detail-close">×</button>
          </div>
          <div class="triage__detail-body" id="detail-body"></div>
          <div class="triage__detail-actions" id="detail-actions"></div>
        </div>
      </div>
    </main>

    <div id="status" class="status">ready.</div>

    <!-- Confirm dialog -->
    <dialog class="triage__confirm" id="confirm-dialog">
      <div class="triage__confirm-body">
        <p class="triage__confirm-title" id="confirm-title">Confirm</p>
        <p class="triage__confirm-desc" id="confirm-desc"></p>
      </div>
      <div class="triage__confirm-footer">
        <button class="btn btn--small" id="confirm-cancel">Cancel</button>
        <button class="btn btn--small btn--primary" id="confirm-ok">Confirm</button>
      </div>
    </dialog>

    <script type="module" src="/triage.js"></script>
  </body>
</html>
